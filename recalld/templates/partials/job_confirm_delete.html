<li class="job-item">
  <div class="job-meta">
    <span class="job-filename">Remove <strong>{{ job.original_filename }}</strong>?</span>
  </div>
  <div class="job-actions">
    <button class="btn-ghost danger"
      hx-delete="/jobs/{{ job.id }}"
      hx-target="closest li"
      hx-swap="delete">Delete</button>
    <button class="btn-ghost"
      hx-get="/jobs/{{ job.id }}/row"
      hx-target="closest li"
      hx-swap="outerHTML">Cancel</button>
  </div>
</li>

<li class="job-item">
  <div class="job-meta">
    <span class="job-filename">{{ job.original_filename }}</span>
    <span class="job-stage">{{ job.current_stage.value }}</span>
  </div>
  <div class="job-actions">
    <button type="button" class="btn-ghost stage-restart-btn"
      hx-post="/jobs/{{ job.id }}/restart-from/{{ job.current_stage.value }}" hx-swap="none"
      title="Restart from {{ job.current_stage.value }}">
      Restart
    </button>
    <a href="/jobs/{{ job.id }}" class="btn-ghost">View details</a>
    <button class="btn-ghost danger"
      hx-get="/jobs/{{ job.id }}/confirm-delete"
      hx-target="closest li"
      hx-swap="outerHTML">Remove</button>
  </div>
</li>

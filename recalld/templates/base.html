<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>recalld</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/marked.min.js"></script>
  <script src="/static/app.js"></script>
</head>
<body>

<header class="app-header">
  <div class="header-row header-top">
    <a class="brand" href="/">
      <img class="logo-light" src="/static/logos/logo-memory-node-v1.svg" alt="" aria-hidden="true">
      <img class="logo-dark" src="/static/logos/logo-memory-node-dark-v1.svg" alt="" aria-hidden="true">
      <span>recalld</span>
    </a>
    <div id="status-bar-indicators"
         hx-get="/settings/status"
         hx-trigger="load, every 30s"
         hx-swap="innerHTML">
      <span class="status-indicator"><span class="dot yellow"></span> checking…</span>
    </div>
  </div>
  <div class="header-row header-nav">
    <nav>
      <a href="/" {% if request.url.path == "/" and active_tab != "jobs" %}class="active"{% endif %}>New recording</a>
      <a href="/?tab=jobs" {% if request.url.path == "/" and active_tab == "jobs" %}class="active"{% endif %}>All jobs</a>
      <a href="/settings/" {% if request.url.path.startswith("/settings") %}class="active"{% endif %}>Settings</a>
    </nav>
  </div>
</header>
<div id="status-popover" class="status-popover" hidden aria-live="polite"></div>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>

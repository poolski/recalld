<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>recalld</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/app.js" defer></script>
</head>
<body>

<div class="status-bar">
  <strong>recalld</strong>
  <div id="status-bar-indicators" hx-get="/settings/status" hx-trigger="load, every 30s" hx-swap="innerHTML">
    <span class="status-indicator"><span class="dot yellow"></span> checking…</span>
  </div>
</div>

<main>
  <nav>
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Upload</a>
    <a href="/settings/" {% if request.url.path.startswith("/settings") %}class="active"{% endif %}>Settings</a>
  </nav>
  {% block content %}{% endblock %}
</main>

</body>
</html>
